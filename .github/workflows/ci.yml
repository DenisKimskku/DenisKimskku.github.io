name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      # --strict: fail the check if the frontmatter-repair path fires instead
      # of silently rewriting .md files in an uncommitted CI checkout.
      - name: Generate articles index
        run: npm run generate:index -- --strict

      # Schema violations (bad date/type/title, duplicate slugs) fail CI here
      # but only warn in the deploy path — content never blocks a deploy.
      - name: Lint content frontmatter (strict)
        run: node scripts/lint-content.mjs --strict

      - name: Build
        run: npm run build
