name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # HEAD~ is needed by the slug-collision tripwire below.
          fetch-depth: 2

      # Tripwire: the external automation has overwritten existing articles on
      # slug collision (auto-commits 4c824c7 and bdf8141 MODIFIED files under
      # src/content/articles/). Detect a modified article inside an
      # auto-generated commit and alert + file an issue — but never fail the
      # build: an overwrite is a content problem, not a deploy problem.
      - name: Alert if automation overwrote an existing article
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          printf '%s' "$HEAD_MSG" | grep -qE 'Add .* auto-generated' || exit 0
          # fetch-depth: 2 normally provides HEAD~, but not for the repo's
          # first commit or a dispatch on an odd ref — skip quietly then.
          if ! git rev-parse --verify --quiet 'HEAD~' >/dev/null; then
            echo "HEAD~ unavailable in this checkout; skipping tripwire."
            exit 0
          fi
          modified=$(git diff --diff-filter=M --name-only HEAD~ HEAD -- src/content/articles/ || true)
          [ -n "$modified" ] || exit 0
          echo "::warning::Auto-generated commit modified existing article(s):"
          echo "$modified"
          curl -s -H 'Title: AUTO-CONTENT OVERWROTE EXISTING ARTICLE' -H 'Priority: high' \
            --data-binary "$(printf 'Auto-generated commit %s modified existing article(s):\n%s' "$GITHUB_SHA" "$modified")" \
            ntfy.sh/deniskim-kb || true
          # One open issue is enough; don't file a new one per collision.
          existing=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "Automation overwrote existing article in:title" --limit 1 --json number --jq '.[0].number // empty' || true)
          if [ -z "$existing" ]; then
            gh issue create --repo "${{ github.repository }}" \
              --title "Automation overwrote existing article (slug collision)" \
              --body "$(printf 'Auto-generated commit %s modified existing article(s):\n\n%s\n\nRun: %s/%s/actions/runs/%s' "$GITHUB_SHA" "$modified" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")" \
              || true # never fail the build over a notification failure
          else
            echo "Open slug-collision issue #$existing already exists; skipping."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Install dependencies
        run: npm ci

      # The daily automation pushes straight to main and bypasses ci.yml, so
      # this is the only test gate that always runs.
      - name: Run tests
        run: npm test

      # Deliberately NOT --strict: a broken escape from the automation must
      # never block a site deploy (the repair path handles it in-run).
      - name: Generate articles index
        run: npm run generate:index

      # The generator quarantines unparseable articles instead of throwing
      # (content must never block a deploy) and lists them in
      # quarantined-articles.txt — surface that loudly, then continue.
      - name: Ntfy alert on quarantined articles
        continue-on-error: true
        run: |
          if [ -f quarantined-articles.txt ]; then
            curl -s -H 'Title: ARTICLE QUARANTINED — deploy continued' -H 'Priority: high' \
              --data-binary "$(printf 'Deploy continued without unparseable article(s):\n%s' "$(cat quarantined-articles.txt)")" \
              ntfy.sh/deniskim-kb || true
          fi

      - name: Build with Next.js
        run: npm run build

      - name: Stamp deploy marker
        run: echo "${GITHUB_SHA}" > out/deploy-marker.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Ntfy alert on build failure
        if: failure()
        run: |
          curl -s -H 'Title: SITE DEPLOY FAILED' -H 'Priority: high' -d 'deniskim1.com deploy failed — check Actions' ntfy.sh/deniskim-kb

      - name: File issue on build failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # One open issue is enough; don't file a new one per failed run.
          existing=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "Deploy failed in:title" --limit 1 --json number --jq '.[0].number // empty' || true)
          if [ -z "$existing" ]; then
            gh issue create --repo "${{ github.repository }}" \
              --title "Deploy failed for ${{ github.sha }}" \
              --body "The Pages build job failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              || true # never mask the build failure with a notification failure
          else
            echo "Open deploy-failure issue #$existing already exists; skipping."
          fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Cloudflare HTML and RSC cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npm run purge:cache

      - name: Wait for new deploy to be live
        run: |
          # Poll the build-stamped marker until the origin serves THIS commit;
          # any date-based signal matches the previous same-day deploy too.
          # Pin to a Pages IP (-k: Pages serves its github.io cert on pinned
          # connections): Cloudflare bot rules 403 Actions traffic to the
          # zone, so polling through the edge never matches and this loop
          # silently degraded into a fixed 120s sleep.
          for i in $(seq 1 24); do
            marker=$(curl -fsSk --resolve deniskim1.com:443:185.199.108.153 --max-time 10 "https://deniskim1.com/deploy-marker.txt?cb=${GITHUB_SHA}-${i}" || true)
            if [ "$(printf '%s' "$marker" | tr -d '[:space:]')" = "${GITHUB_SHA}" ]; then
              echo "Origin is serving this deploy after $((i * 5))s."
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Deploy marker did not match ${GITHUB_SHA} within ~120s; warming anyway."

      # A slow warm must never fail the deploy or hold the 'pages' concurrency
      # lock (one run held it ~60 min) — cap it and swallow failures.
      - name: Warm Cloudflare cache
        timeout-minutes: 15
        continue-on-error: true
        run: CACHE_WARM_PASSES=2 CACHE_WARM_PASS_DELAY_MS=45000 CACHE_WARM_RETRIES=2 npm run warm:cache

      # The purge above emptied every colo worldwide; local warming refills
      # only US colos, so re-seed the other regions via Globalping probes.
      - name: Warm remote regions via Globalping
        timeout-minutes: 5
        continue-on-error: true
        env:
          GLOBALPING_TOKEN: ${{ secrets.GLOBALPING_TOKEN }}
        run: npm run warm:global

      # Mirror of the build job's failure notification: a deploy-job failure
      # (deploy-pages error, purge failure, the 45-min job timeout) would
      # otherwise be a silent red run.
      - name: Ntfy alert on deploy failure
        if: failure()
        run: |
          curl -s -H 'Title: SITE DEPLOY FAILED' -H 'Priority: high' -d 'deniskim1.com deploy failed — check Actions' ntfy.sh/deniskim-kb

      - name: File issue on deploy failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "Deploy failed in:title" --limit 1 --json number --jq '.[0].number // empty' || true)
          if [ -z "$existing" ]; then
            gh issue create --repo "${{ github.repository }}" \
              --title "Deploy failed for ${{ github.sha }}" \
              --body "The Pages deploy job failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              || true # never mask the deploy failure with a notification failure
          else
            echo "Open deploy-failure issue #$existing already exists; skipping."
          fi
