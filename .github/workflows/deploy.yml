name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies
        run: sudo apt-get install -y webp

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Warm Cloudflare cache
        run: |
          sleep 10
          BASE=https://deniskim1.com
          # Extract all URLs from sitemap
          URLS=$(curl -s "${BASE}/sitemap.xml" | grep -oP '(?<=<loc>)[^<]+')
          # Warm HTML pages (8 parallel)
          echo "$URLS" | xargs -P 8 -I {} curl -sL {} -o /dev/null
          # Warm RSC payloads for client-side navigation
          echo "$URLS" | sed 's|/$|/|' | while read -r url; do
            path="${url#$BASE}"
            for f in __next._full.txt index.txt; do
              echo "${BASE}${path}${f}"
            done
          done | xargs -P 8 -I {} curl -sL {} -o /dev/null
