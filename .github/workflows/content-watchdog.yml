name: Content watchdog

on:
  schedule:
    # Daily at 21:00 UTC — the external automation should have published
    # today's digest well before this.
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check newest article age
        id: freshness
        run: |
          node -e '
            const idx = require("./src/data/articles-index.json");
            const newest = idx.map((a) => a.date).filter(Boolean).sort().at(-1);
            if (!newest) { console.error("No dated articles in index."); process.exit(1); }
            const ageHours = (Date.now() - Date.parse(newest + "T00:00:00Z")) / 3.6e6;
            console.log(`Newest article: ${newest} (${ageHours.toFixed(1)}h old)`);
            if (ageHours > 36) {
              console.error("::error::Newest article is older than 36h — the content automation may be broken.");
              process.exit(1);
            }
          '

      # Repo-fresh but site-stale must not pass: the newest article being in
      # the index proves nothing about the deployed site, so verify it is
      # actually served. Cloudflare bot rules 403 ALL GitHub Actions traffic
      # to the zone (keep-warm gets 403 on every request too, browser UA or
      # not), so the edge URL cannot be probed from CI. Probe the GitHub
      # Pages origin instead by pinning the custom domain to the Pages IPs.
      # TLS verify is off (-k) because Pages presents its github.io cert on
      # pinned connections; authenticity comes from requiring the fetched
      # HTML to contain the article slug, not from the probe's cert chain.
      - name: Check newest article is served by the GitHub Pages origin
        id: liveness
        run: |
          slug=$(node -e '
            const idx = require("./src/data/articles-index.json");
            const newest = idx
              .filter((a) => a.date && a.slug)
              .sort((a, b) => a.date.localeCompare(b.date))
              .at(-1);
            if (!newest) { console.error("No dated articles with slugs in index."); process.exit(1); }
            console.log(newest.slug);
          ')
          url="https://deniskim1.com/writing/${slug}/"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Checking origin for: $url"
          ok=""
          status=000
          for ip in 185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153; do
            status=$(curl -sSk --resolve "deniskim1.com:443:${ip}" --max-time 30 \
              -o /tmp/article.html -w '%{http_code}' "${url}?cb=${GITHUB_RUN_ID}" || echo 000)
            echo "Origin ${ip}: HTTP ${status}"
            if [ "$status" = "200" ] && grep -q "$slug" /tmp/article.html; then
              ok=1
              break
            fi
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ -z "$ok" ]; then
            echo "::error::Newest article ($slug) is in the repo but the origin is not serving it (last HTTP $status)."
            exit 1
          fi
          # Edge probe is informational only: Cloudflare blocks CI IPs, so a
          # 403 here is expected noise, never an outage signal.
          edge=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 "${url}?cb=${GITHUB_RUN_ID}-edge" || echo 000)
          echo "Edge (through Cloudflare) says HTTP ${edge} — informational only."

      - name: File issue on watchdog failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Title must name the check that failed — a liveness 403 filed as
          # "content stale" sends triage down the wrong path.
          if [ "${{ steps.freshness.outcome }}" = "failure" ]; then
            title="Content automation stale: no new article in 36h"
            body="The content watchdog found no article newer than 36h in src/data/articles-index.json."
          else
            title="Watchdog liveness check failed: origin not serving newest article"
            body="The GitHub Pages origin is not serving ${{ steps.liveness.outputs.url }} (HTTP ${{ steps.liveness.outputs.status }} across all four Pages IPs). The article is in the repo, so the deploy pipeline most likely failed to publish it — check the latest Deploy run."
          fi
          body="$body Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # One open issue per failure mode is enough; a stalled pipeline fails every day.
          existing=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "\"$title\" in:title" --limit 1 --json number --jq '.[0].number // empty' || true)
          if [ -z "$existing" ]; then
            gh issue create --repo "${{ github.repository }}" \
              --title "$title" \
              --body "$body" \
              || true # never mask the check failure with a notification failure
          else
            echo "Open issue #$existing already exists; skipping."
          fi

      - name: Ntfy alert on watchdog failure
        if: failure()
        run: |
          curl -s -H 'Title: SITE WATCHDOG FAILED' -H 'Priority: high' -d 'deniskim1.com content watchdog failed — check Actions' ntfy.sh/deniskim-kb
