name: Deploy Cloudflare Worker (ask-ai proxy)

on:
  push:
    branches: ["main"]
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-worker"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install the Worker's own pinned wrangler@4 + workers-types@5 from its
      # lockfile. Without this, wrangler-action finds no local wrangler and
      # auto-installs an old default (wrangler@3) that peer-conflicts with
      # workers-types@5 and fails the deploy.
      - name: Install worker deps
        working-directory: cloudflare-worker
        run: npm ci

      # Deploys the Worker and pushes NVIDIA_API_KEY as a Worker secret.
      # The key is passed only via the action's `secrets` input — it is
      # never echoed in any run step. wranglerVersion pins the action to the
      # locally installed wrangler so it never reaches for a conflicting default.
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: cloudflare-worker
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            NVIDIA_API_KEY
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
