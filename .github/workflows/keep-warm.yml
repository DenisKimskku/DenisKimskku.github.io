name: Keep Cloudflare cache warm

on:
  schedule:
    # Every 8 hours, offset from round minutes — GitHub drops most jobs scheduled
    # on round minutes under congestion.
    - cron: '13 */8 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cache-warm"
  cancel-in-progress: true

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Warm sitemap pages and critical assets
        run: CACHE_WARM_PASSES=2 CACHE_WARM_PASS_DELAY_MS=30000 CACHE_WARM_RETRIES=2 npm run warm:cache

      # Local warming only fills US colos (runner egress); Globalping probes
      # fill each region's own colo. Best-effort: the script always exits 0.
      - name: Warm remote regions via Globalping
        continue-on-error: true
        env:
          GLOBALPING_TOKEN: ${{ secrets.GLOBALPING_TOKEN }}
        run: npm run warm:global
