name: Keep Cloudflare cache warm

on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Ping main pages
        run: |
          curl -sL https://deniskim1.com/ -o /dev/null
          curl -sL https://deniskim1.com/writing/ -o /dev/null
          curl -sL https://deniskim1.com/papers/ -o /dev/null
          curl -sL https://deniskim1.com/code/ -o /dev/null
