name: Keep Cloudflare cache warm

on:
  schedule:
    # Every 30 minutes, offset from :00/:30 — GitHub drops most jobs scheduled on
    # round minutes under congestion (observed real cadence was 70–195 min).
    - cron: '13,43 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cache-warm"
  cancel-in-progress: true

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Warm sitemap pages and critical assets
        run: CACHE_WARM_PASSES=2 CACHE_WARM_PASS_DELAY_MS=30000 CACHE_WARM_RETRIES=2 npm run warm:cache
