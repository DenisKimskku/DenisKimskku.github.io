name: Keep Cloudflare cache warm

on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Warm all pages from sitemap
        run: |
          BASE=https://deniskim1.com
          URLS=$(curl -s "${BASE}/sitemap.xml" | grep -o '<loc>[^<]*</loc>' | sed 's/<loc>//g;s/<\/loc>//g')
          echo "$URLS" | xargs -P 8 -I {} curl -sL {} -o /dev/null || true
          echo "$URLS" | sed 's|/$|/|' | while read -r url; do
            path="${url#$BASE}"
            for f in __next._full.txt index.txt; do
              echo "${BASE}${path}${f}"
            done
          done | xargs -P 8 -I {} curl -sL {} -o /dev/null || true
